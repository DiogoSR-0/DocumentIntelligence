services:
  postgres:
    image: postgres:17
    container_name: document-intelligence-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - document_intelligence_postgres_data:/var/lib/postgresql/data

volumes:
  document_intelligence_postgres_data: